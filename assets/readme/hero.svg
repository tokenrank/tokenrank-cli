<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">TokenRank CLI local AI token usage collector</title>
  <desc id="desc">A terminal-oriented view of TokenRank CLI previewing local usage, uploading aggregate rows, and reporting healthy status.</desc>
  <defs>
    <linearGradient id="edge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#D6FF3F"/>
      <stop offset="1" stop-color="#67E8E2"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="420" rx="24" fill="#0A0D0B"/>
  <rect x="0" y="0" width="10" height="420" rx="5" fill="url(#edge)"/>

  <g transform="translate(54 46)">
    <rect width="520" height="328" rx="12" fill="#070907" stroke="#343A33" stroke-width="2"/>
    <rect width="520" height="44" rx="12" fill="#141814"/>
    <path d="M0 44H520" stroke="#343A33"/>
    <circle cx="24" cy="22" r="5" fill="#FF5B35"/>
    <circle cx="44" cy="22" r="5" fill="#D6FF3F"/>
    <circle cx="64" cy="22" r="5" fill="#67E8E2"/>
    <text x="96" y="28" fill="#858B80" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="17">tokenrank — local collector</text>

    <g transform="translate(24 78)" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
      <text x="0" y="0" fill="#D6FF3F" font-size="21" font-weight="800">$</text>
      <text x="28" y="0" fill="#F2F1E8" font-size="21">tokenrank preview</text>
      <text x="28" y="30" fill="#858B80" font-size="18">scan local sources · upload nothing</text>

      <text x="0" y="84" fill="#D6FF3F" font-size="21" font-weight="800">$</text>
      <text x="28" y="84" fill="#F2F1E8" font-size="21">tokenrank upload</text>
      <text x="28" y="114" fill="#858B80" font-size="18">UTC aggregate rows → private webhook</text>

      <text x="0" y="168" fill="#D6FF3F" font-size="21" font-weight="800">$</text>
      <text x="28" y="168" fill="#F2F1E8" font-size="21">tokenrank status</text>
      <rect x="28" y="188" width="128" height="34" rx="4" fill="#D6FF3F"/>
      <text x="46" y="211" fill="#070907" font-size="18" font-weight="900">HEALTHY</text>
      <text x="172" y="211" fill="#67E8E2" font-size="18">hourly sync ready</text>

      <rect x="28" y="244" width="14" height="25" fill="#D6FF3F"/>
    </g>
  </g>

  <g transform="translate(630 62)">
    <text x="0" y="0" fill="#858B80" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18" font-weight="700" letter-spacing="3">LOCAL AI USAGE COLLECTOR</text>
    <text x="0" y="86" fill="#F2F1E8" font-family="Arial Narrow, Segoe UI, sans-serif" font-size="64" font-weight="850" letter-spacing="-3">TOKEN<tspan fill="#D6FF3F">/</tspan>RANK</text>
    <text x="0" y="143" fill="#F2F1E8" font-family="Arial Narrow, Segoe UI, sans-serif" font-size="52" font-weight="850" letter-spacing="-2">CLI</text>
    <text x="0" y="197" fill="#C9CBBF" font-family="Segoe UI, sans-serif" font-size="23">PREVIEW FIRST. CONNECT WHEN READY.</text>

    <g transform="translate(0 242)" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="17" font-weight="700">
      <rect width="152" height="38" rx="4" fill="#141814" stroke="#343A33"/>
      <text x="18" y="25" fill="#D6FF3F">NODE 20+</text>
      <rect x="166" width="222" height="38" rx="4" fill="#141814" stroke="#343A33"/>
      <text x="184" y="25" fill="#67E8E2">0 RUNTIME DEPS</text>
    </g>
    <text x="0" y="322" fill="#858B80" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="17">macOS  ·  Linux  ·  Windows</text>
  </g>
</svg>
